services:
  genetic-car-simulator:
    build: .
    container_name: genetic-car-simulator
    ports:
      - "18473:18473"
    environment:
      PORT: 18473
      LEADERBOARD_FILE: /app/data/leaderboard.json
    volumes:
      - leaderboard-data:/app/data
    restart: unless-stopped

volumes:
  leaderboard-data:
